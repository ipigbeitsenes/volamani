; Per-site PHP overrides for uploads (honoured by PHP-FPM/CGI, e.g. cPanel).
; Keeps larger images/files from being rejected by PHP before Laravel's own
; validation runs. post_max_size must stay >= upload_max_filesize and comfortably
; above the largest allowed upload (product downloadable files cap at 100 MB).
upload_max_filesize = 128M
post_max_size = 128M
max_execution_time = 300
max_input_time = 300
