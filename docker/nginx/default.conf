server {
    listen 80;
    index index.php index.html;
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
    root /var/www/public;

    # Re-resolve the PHP-FPM container via Docker's embedded DNS on every request
    # instead of caching its IP at startup. Without this, an app-container restart
    # (which can hand it a new IP) leaves nginx pinned to the old IP → 502s until
    # nginx is reloaded. The variable below is what forces the runtime lookup.
    resolver 127.0.0.11 valid=10s ipv6=off;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        # Using a variable (not a literal host) makes nginx resolve via the
        # `resolver` above at request time, so app-container IP changes are picked
        # up automatically without a reload.
        set $upstream_app app:9000;
        fastcgi_pass $upstream_app;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    client_max_body_size 100M;
}
